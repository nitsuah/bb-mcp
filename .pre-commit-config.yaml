# .pre-commit-config.yaml
# Run tests via Docker: docker compose -f config/docker-compose.yml --profile test run --rm test

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
        args: ['--maxkb=500']
  - repo: local
    hooks:
      - id: docker-lint
        name: lint (docker)
        language: system
        entry: make docker-lint
        pass_filenames: false
        stages: [pre-commit]
      - id: docker-test
        name: unit tests (docker)
        language: system
        entry: docker compose -f config/docker-compose.yml --profile test run --rm test
        pass_filenames: false
        stages: [pre-push]