name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Docker image
        run: docker build -t bb-mcp:ci .

      - name: Extract build artifacts
        if: github.ref == 'refs/heads/main'
        run: |
          docker create --name bb-mcp-artifacts bb-mcp:ci
          docker cp bb-mcp-artifacts:/app/dist ./dist
          docker rm bb-mcp-artifacts

      - name: Upload Build Artifacts
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 5