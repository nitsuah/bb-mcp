name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build test image
        run: docker build --target test -t bb-mcp:test .

      - name: Lint (Docker)
        run: docker run --rm bb-mcp:test npm run lint

      - name: Unit tests with coverage (Docker)
        run: docker run --rm bb-mcp:test npm run test:coverage

      - name: Security audit (high+)
        run: docker run --rm bb-mcp:test npm audit --audit-level=high

      - name: Cyclomatic complexity metric
        run: docker run --rm bb-mcp:test npm run metrics:complexity

      - name: TSDoc coverage metric
        run: docker run --rm bb-mcp:test npm run metrics:docs

      - name: Build runtime image
        run: docker build -t bb-mcp:ci .

      - name: Record dist size (Docker)
        run: docker run --rm bb-mcp:test sh -lc "du -sh dist" > dist-size.txt

      - name: Upload quality artifacts
        uses: actions/upload-artifact@v7
        with:
          name: quality-artifacts
          path: dist-size.txt
          retention-days: 7

      - name: Extract build artifacts
        if: github.ref == 'refs/heads/main'
        run: |
          docker create --name bb-mcp-artifacts bb-mcp:ci
          docker cp bb-mcp-artifacts:/app/dist ./dist
          docker rm bb-mcp-artifacts

      - name: Upload Build Artifacts
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 5