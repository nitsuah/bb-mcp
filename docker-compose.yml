# blackboard-learn-mcp — standalone stack
# Run:  docker compose up -d
# MCP endpoint:  http://localhost:3100/mcp
# Health:        http://localhost:3100/health
# Metrics:       http://localhost:3100/metrics

services:
  bb-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bb-mcp
    init: true
    restart: unless-stopped
    ports:
      - "3100:3100"
    env_file:
      - .env
    environment:
      - PORT=3100
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-http://localhost:3100}
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3100/health',(r)=>{r.resume();r.on('end',()=>process.exit(r.statusCode===200?0:1))}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

networks:
  default:
    name: bb-mcp-network
